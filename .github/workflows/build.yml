name: Build v2rayNG APK

on:
  workflow_dispatch:
    inputs:
      XRAY_CORE_VERSION:
        description: 'xray version or commit hash'
        required: true
      V2RAYNG_VERSION:
        description: 'v2rayNG version'
        required: false
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.6'

      - name: Setup Android environment
        uses: android-actions/setup-android@v3

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${{ github.workspace }}/build"
          cd "${{ github.workspace }}/build"
          git clone --depth=1 -b main https://github.com/2dust/AndroidLibXrayLite.git
          cd AndroidLibXrayLite

          go get github.com/xtls/xray-core@${{ github.event.inputs.XRAY_CORE_VERSION }} || true

          MOBILE_VER="$(awk '/golang.org\/x\/mobile[[:space:]]/ {print $2; exit}' go.mod || true)"
          if [ -z "${MOBILE_VER}" ]; then
            echo "golang.org/x/mobile version not found in go.mod"
            exit 1
          fi

          go install "golang.org/x/mobile/cmd/gomobile@${MOBILE_VER}"
          export PATH="$(go env GOPATH)/bin:${PATH}"

          gomobile init
          go mod tidy -v
          gomobile bind -v -androidapi 19 -ldflags='-s -w' ./
          cp -v *.aar "${{ github.workspace }}/V2rayNG/app/libs/"

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'android_keystore.jks'
          fileDir: '/home/runner/work/v2rayNG/v2rayNG/V2rayNG/app/keystore/'
          encodedString: ${{ secrets.SIGNING_KEY }}

      - name: Build v2rayNG APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        shell: bash
        run: |
          set -euxo pipefail
          cd "${{ github.workspace }}/V2rayNG"
          chmod -R u+rwX .
          sed -i 's/org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8/org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8/' gradle.properties || true
          ./gradlew :app:assembleRelease -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APKs
          path: /home/runner/work/v2rayNG/v2rayNG/V2rayNG/app/build/outputs/apk/release/*.apk

      - name: Upload apk to release
        uses: softprops/action-gh-release@v2
        with:
          name: v2rayNG_master_${{ github.event.inputs.XRAY_CORE_VERSION }}
          tag_name: v2rayNG_master_${{ github.event.inputs.XRAY_CORE_VERSION }}
          files: /home/runner/work/v2rayNG/v2rayNG/V2rayNG/app/build/outputs/apk/release/*.apk
